<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GospelSwipe Pro — Gospel Partnership Certificate</title>
<style>
  /* ===== Reset & Base ===== */
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:linear-gradient(145deg,#0a0f14 0%,#0d1b2a 60%,#091520 100%);
    min-height:100vh; color:#fff;
    -webkit-font-smoothing:antialiased;
  }

  /* ===== Page wrapper ===== */
  .page{max-width:680px;margin:0 auto;padding:30px 20px 60px;}

  /* ===== Header ===== */
  .site-header{
    display:flex;align-items:center;gap:14px;
    padding:20px 0 32px;
  }
  .site-header img{width:48px;height:48px;border-radius:12px;}
  .site-header h1{font-size:1.4rem;font-weight:800;
    background:linear-gradient(135deg,#3498db,#2ecc71);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;}
  .site-header p{font-size:0.78rem;opacity:0.5;margin-top:2px;}

  /* ===== Intro card ===== */
  .intro{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(52,152,219,0.25);
    border-radius:20px;padding:22px 24px;margin-bottom:28px;
  }
  .intro h2{font-size:1.1rem;font-weight:700;margin-bottom:8px;color:#fff;}
  .intro p{font-size:0.88rem;line-height:1.65;opacity:0.75;}

  /* ===== Form ===== */
  .form-group{margin-bottom:18px;}
  label{display:block;font-size:0.82rem;font-weight:600;
    opacity:0.7;margin-bottom:7px;letter-spacing:0.4px;text-transform:uppercase;}
  input[type="text"],input[type="date"]{
    width:100%;padding:14px 16px;
    background:rgba(255,255,255,0.06);
    border:1.5px solid rgba(255,255,255,0.14);
    border-radius:14px;color:#fff;font-size:1rem;
    font-family:inherit;outline:none;
    transition:border-color 0.25s;
  }
  input[type="text"]:focus,input[type="date"]:focus{
    border-color:#3498db;
    background:rgba(52,152,219,0.08);
  }
  input::placeholder{color:rgba(255,255,255,0.3);}

  /* ===== Download button ===== */
  .btn-download{
    width:100%;padding:17px;border:none;border-radius:16px;
    background:linear-gradient(135deg,#3498db,#2ecc71);
    color:#fff;font-size:1.05rem;font-weight:700;
    cursor:pointer;display:flex;align-items:center;
    justify-content:center;gap:10px;
    transition:opacity 0.2s,transform 0.2s;
    margin-top:8px;font-family:inherit;
    box-shadow:0 10px 28px rgba(52,152,219,0.3);
  }
  .btn-download:hover{opacity:0.92;transform:translateY(-2px);}
  .btn-download:active{transform:scale(0.98);}
  .btn-download:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

  /* ===== Preview area ===== */
  .preview-wrap{
    margin-top:32px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;padding:20px;
  }
  .preview-label{
    font-size:0.78rem;text-transform:uppercase;
    letter-spacing:0.6px;opacity:0.45;
    margin-bottom:14px;
  }
  canvas{
    width:100%;border-radius:10px;
    display:block;
    box-shadow:0 12px 36px rgba(0,0,0,0.5);
  }

  /* ===== Success note ===== */
  .success-note{
    display:none;
    background:rgba(46,204,113,0.1);
    border:1px solid rgba(46,204,113,0.3);
    border-radius:14px;padding:14px 18px;
    margin-top:16px;font-size:0.88rem;
    color:#2ecc71;text-align:center;line-height:1.5;
  }

  /* ===== Footer ===== */
  .site-footer{
    text-align:center;padding-top:36px;
    font-size:0.78rem;opacity:0.4;line-height:1.8;
  }
  .site-footer a{color:#3498db;text-decoration:none;}
</style>
</head>
